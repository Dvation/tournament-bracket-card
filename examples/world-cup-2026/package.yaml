# ---------------------------------------------------------------------------
# World Cup 2026 — data glue for the tournament dashboard
#
# Produces, from ESPN's PUBLIC API (no API key, no secrets):
#   - sensor.wc_bracket    .rounds   -> knockout bracket (tournament-bracket-card)
#   - sensor.wc_standings  .groups   -> the 12 group tables
#   - sensor.wc_schedule   .matches  -> today / live / fixtures / results
#
# Install: copy this file to <config>/packages/world_cup_bracket.yaml and ensure
# packages are enabled in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then restart Home Assistant. (Or merge the `rest:` and `template:` sections
# into your configuration.yaml directly.)
# ---------------------------------------------------------------------------

rest:
  - resource: "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?lang=en&limit=100&dates=20260628-20260719"
    scan_interval: 120
    timeout: 30
    headers:
      User-Agent: "Home Assistant World Cup Bracket"
    sensor:
      - name: "WC Knockout Raw"
        unique_id: wc_knockout_raw
        value_template: "{{ (value_json.events | default([])) | count }}"
        json_attributes:
          - events

  - resource: "https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings"
    scan_interval: 600
    timeout: 30
    headers:
      User-Agent: "Home Assistant World Cup Bracket"
    sensor:
      - name: "WC Standings Raw"
        unique_id: wc_standings_raw
        value_template: "{{ (value_json.children | default([])) | count }}"
        json_attributes:
          - children

  # Rolling window (last 7 days .. next 14 days) keeps the attribute size bounded.
  # Widen the day offsets if you want more history / lookahead.
  - resource_template: >-
      https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?lang=en&limit=200&dates={{ (now() - timedelta(days=7)).strftime('%Y%m%d') }}-{{ (now() + timedelta(days=14)).strftime('%Y%m%d') }}
    scan_interval: 120
    timeout: 30
    headers:
      User-Agent: "Home Assistant World Cup Bracket"
    sensor:
      - name: "WC Matches Raw"
        unique_id: wc_matches_raw
        value_template: "{{ (value_json.events | default([])) | count }}"
        json_attributes:
          - events

template:
  - trigger:
      - platform: state
        entity_id: sensor.wc_knockout_raw
      - platform: state
        entity_id: sensor.wc_standings
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/2"
    sensor:
      - name: "WC Bracket"
        unique_id: wc_bracket
        state: "{{ (state_attr('sensor.wc_knockout_raw', 'events') | default([])) | count }} matches"
        attributes:
          # Emit the neutral `rounds` model as a JSON string; the card parses
          # either a JSON string or a native list.
          rounds: >
            {# Project placeholder knockout slots (1A/2B/...) from live group
               standings so real names appear before the group stage ends. When
               ESPN fills the actual qualified team (logo present), that wins. #}
            {% set sraw = state_attr('sensor.wc_standings', 'groups') %}
            {% set gp = (sraw|from_json) if sraw is string else (sraw or []) %}
            {% macro pname(t) %}{% if t.logo %}{{ t.displayName }}{% elif t.abbreviation and t.abbreviation|length==2 and t.abbreviation[0] in '12' and t.abbreviation[1] in 'ABCDEFGHIJKL' %}{% set grp = gp|selectattr('name','eq','Group ' + t.abbreviation[1])|list|first %}{% if grp and (grp.teams|length)>=(t.abbreviation[0]|int) %}{{ grp.teams[(t.abbreviation[0]|int)-1].name }}{% else %}{{ t.abbreviation }}{% endif %}{% elif 'Third Place' in (t.displayName|string) %}{{ t.displayName | replace('Third Place Group ','3rd ') }}{% else %}{{ t.displayName or t.abbreviation }}{% endif %}{% endmacro %}
            {% macro plogo(t) %}{% if t.logo %}{{ t.logo }}{% elif t.abbreviation and t.abbreviation|length==2 and t.abbreviation[0] in '12' and t.abbreviation[1] in 'ABCDEFGHIJKL' %}{% set grp = gp|selectattr('name','eq','Group ' + t.abbreviation[1])|list|first %}{% if grp and (grp.teams|length)>=(t.abbreviation[0]|int) %}{{ grp.teams[(t.abbreviation[0]|int)-1].logo }}{% endif %}{% endif %}{% endmacro %}
            {% set events = state_attr('sensor.wc_knockout_raw', 'events') or [] %}
            {# Bracket position order per round (match #N = the Nth match sorted
               by id). ESPN's R32->R16 feed is interleaved, so laying matches out
               by date/id mis-pairs the connectors; this orders each round
               top-to-bottom in true bracket order. #}
            {% set bracket_order = {'round-of-32': [1,3,4,5,11,12,9,10,2,6,7,8,13,15,14,16], 'round-of-16': [1,2,5,6,3,4,7,8], 'quarterfinals': [1,2,3,4], 'semifinals': [1,2], 'final': [1], '3rd-place-match': [1]} %}
            {% set order = [
              {'slug': 'round-of-32',     'name': 'Round of 32'},
              {'slug': 'round-of-16',     'name': 'Round of 16'},
              {'slug': 'quarterfinals',   'name': 'Quarterfinals'},
              {'slug': 'semifinals',      'name': 'Semifinals'},
              {'slug': 'final',           'name': 'Final'},
              {'slug': '3rd-place-match', 'name': 'Third Place'}
            ] %}
            {% set ns = namespace(rounds=[]) %}
            {% for r in order %}
              {% set rms = namespace(l=[]) %}
              {% for e in (events | sort(attribute='id')) if e.season.slug == r.slug %}{% set rms.l = rms.l + [e] %}{% endfor %}
              {% set bo = bracket_order[r.slug] if r.slug in bracket_order else (range(1, (rms.l|length)+1)|list) %}
              {% set ms = namespace(list=[]) %}
              {% for n in bo %}{% if n <= (rms.l|length) %}
                {% set e = rms.l[n-1] %}
                {% set comp = e.competitions[0] %}
                {% set st = comp.status.type %}
                {% set state = 'live' if st.state == 'in' else st.state %}
                {% set home = (comp.competitors | selectattr('homeAway', 'eq', 'home') | list) %}
                {% set away = (comp.competitors | selectattr('homeAway', 'eq', 'away') | list) %}
                {% if home and away %}
                  {% set h = home[0] %}
                  {% set a = away[0] %}
                  {% set hn = pname(h.team)|trim %}{% set hl = plogo(h.team)|trim %}
                  {% set an = pname(a.team)|trim %}{% set al = plogo(a.team)|trim %}
                  {% set m = {
                    'id': e.id, 'date': e.date, 'state': state,
                    'statusDetail': (st.shortDetail if st.state != 'pre' else none),
                    'sideA': {'name': hn, 'short': h.team.abbreviation, 'logo': (hl if hl else none), 'score': (h.score if st.state != 'pre' else none), 'winner': h.winner},
                    'sideB': {'name': an, 'short': a.team.abbreviation, 'logo': (al if al else none), 'score': (a.score if st.state != 'pre' else none), 'winner': a.winner}
                  } %}
                  {% set ms.list = ms.list + [m] %}
                {% endif %}
              {% endif %}{% endfor %}
              {% if ms.list %}
                {% set ns.rounds = ns.rounds + [{'id': r.slug, 'name': r.name, 'matches': ms.list}] %}
              {% endif %}
            {% endfor %}
            {{ ns.rounds | to_json }}

  - trigger:
      - platform: state
        entity_id: sensor.wc_standings_raw
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/10"
    sensor:
      - name: "WC Standings"
        unique_id: wc_standings
        state: "{{ (state_attr('sensor.wc_standings_raw', 'children') | default([])) | count }} groups"
        attributes:
          # 12 group tables, teams sorted by rank, as a JSON string.
          groups: >
            {% set children = state_attr('sensor.wc_standings_raw', 'children') or [] %}
            {% set ns = namespace(groups=[]) %}
            {% for g in children %}
              {% set teams = namespace(list=[]) %}
              {% for e in g.standings.entries %}
                {% set t = {
                  'name': e.team.displayName, 'abbr': e.team.abbreviation,
                  'logo': (e.team.logos[0].href if e.team.logos else none),
                  'gp': (e.stats|selectattr('name','eq','gamesPlayed')|map(attribute='displayValue')|first|default('0')),
                  'w': (e.stats|selectattr('name','eq','wins')|map(attribute='displayValue')|first|default('0')),
                  'd': (e.stats|selectattr('name','eq','ties')|map(attribute='displayValue')|first|default('0')),
                  'l': (e.stats|selectattr('name','eq','losses')|map(attribute='displayValue')|first|default('0')),
                  'gf': (e.stats|selectattr('name','eq','pointsFor')|map(attribute='displayValue')|first|default('0')),
                  'ga': (e.stats|selectattr('name','eq','pointsAgainst')|map(attribute='displayValue')|first|default('0')),
                  'gd': (e.stats|selectattr('name','eq','pointDifferential')|map(attribute='displayValue')|first|default('0')),
                  'pts': (e.stats|selectattr('name','eq','points')|map(attribute='displayValue')|first|default('0')),
                  'rank': (e.stats|selectattr('name','eq','rank')|map(attribute='value')|first|default(99))|int,
                  'note_desc': (e.note.description if e.note else none),
                  'note_color': (e.note.color if e.note else none),
                  'advanced': ((e.stats|selectattr('name','eq','advanced')|map(attribute='displayValue')|first|default('0')) == '1')
                } %}
                {% set teams.list = teams.list + [t] %}
              {% endfor %}
              {% set ns.groups = ns.groups + [{'name': g.name, 'teams': (teams.list|sort(attribute='rank'))}] %}
            {% endfor %}
            {{ ns.groups | to_json }}

  - trigger:
      - platform: state
        entity_id: sensor.wc_matches_raw
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/2"
    sensor:
      - name: "WC Schedule"
        unique_id: wc_schedule
        state: "{{ (state_attr('sensor.wc_matches_raw', 'events') | default([])) | count }} matches"
        attributes:
          # Compact, date-sorted match list. The dashboard markdown cards filter
          # this into today / live / fixtures (pre) / results (post).
          matches: >
            {% set events = state_attr('sensor.wc_matches_raw', 'events') or [] %}
            {% set ns = namespace(list=[]) %}
            {% for e in events %}
              {% set comp = e.competitions[0] %}
              {% set st = comp.status.type %}
              {% set state = 'live' if st.state == 'in' else st.state %}
              {% set home = (comp.competitors | selectattr('homeAway','eq','home') | list) %}
              {% set away = (comp.competitors | selectattr('homeAway','eq','away') | list) %}
              {% if home and away %}
                {% set h = home[0] %}
                {% set a = away[0] %}
                {% set m = {
                  'date': e.date, 'stage': e.season.slug, 'state': state, 'status': st.shortDetail,
                  'home': h.team.displayName, 'homeAbbr': h.team.abbreviation, 'homeLogo': (h.team.logo if h.team.logo else none), 'homeScore': (h.score if st.state != 'pre' else none),
                  'away': a.team.displayName, 'awayAbbr': a.team.abbreviation, 'awayLogo': (a.team.logo if a.team.logo else none), 'awayScore': (a.score if st.state != 'pre' else none)
                } %}
                {% set ns.list = ns.list + [m] %}
              {% endif %}
            {% endfor %}
            {{ (ns.list | sort(attribute='date')) | to_json }}

# Helper backing the clickable group tabs on the Groups dashboard view.
input_select:
  wc_group:
    name: WC Group
    icon: mdi:soccer
    initial: Group A
    options:
      - Group A
      - Group B
      - Group C
      - Group D
      - Group E
      - Group F
      - Group G
      - Group H
      - Group I
      - Group J
      - Group K
      - Group L

# ---------------------------------------------------------------------------
# Recommended: keep these large/volatile entities out of the recorder database.
# If you already have a `recorder:` block, MERGE these excludes into it instead
# of pasting a second `recorder:` key (duplicate keys will error).
# ---------------------------------------------------------------------------
# recorder:
#   exclude:
#     entities:
#       - sensor.wc_knockout_raw
#       - sensor.wc_bracket
#       - sensor.wc_standings_raw
#       - sensor.wc_standings
#       - sensor.wc_matches_raw
#       - sensor.wc_schedule
